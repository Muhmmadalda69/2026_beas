# Live-reload config for the auth service (used by `npm run dev`).
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/auth.exe ./cmd/auth"
  bin = "tmp/auth.exe"
  delay = 800
  include_ext = ["go"]
  include_dir = ["cmd/auth", "internal/auth", "internal/platform"]
  exclude_dir = ["tmp", ".air"]
  stop_on_error = true
