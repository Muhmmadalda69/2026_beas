# Live-reload config for the gateway (used by `npm run dev`).
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/gateway.exe ./cmd/gateway"
  bin = "tmp/gateway.exe"
  delay = 800
  include_ext = ["go"]
  include_dir = ["cmd/gateway", "internal/platform"]
  exclude_dir = ["tmp", ".air"]
  stop_on_error = true
