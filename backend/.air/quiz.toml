# Live-reload config for the quiz service (used by `npm run dev`).
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/quiz.exe ./cmd/quiz"
  bin = "tmp/quiz.exe"
  delay = 800
  include_ext = ["go"]
  include_dir = ["cmd/quiz", "internal/quiz", "internal/platform"]
  exclude_dir = ["tmp", ".air"]
  stop_on_error = true
