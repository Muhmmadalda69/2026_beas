# Live-reload config for the transliterate service (used by `npm run dev`).
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/translit.exe ./cmd/transliterate"
  bin = "tmp/translit.exe"
  delay = 800
  include_ext = ["go"]
  include_dir = ["cmd/transliterate", "internal/transliterate", "internal/platform"]
  exclude_dir = ["tmp", ".air"]
  stop_on_error = true
