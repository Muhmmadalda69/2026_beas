# Béas — full microservices stack.
# Bring everything up with:  docker compose up --build
# The only public ports are the gateway (8080) and the frontend (3000);
# the individual services and Postgres stay on the internal network.

x-service-env: &service-env
  JWT_SECRET: ${JWT_SECRET:-change-me-please-use-a-32-byte-random-secret}
  JWT_TTL: ${JWT_TTL:-12h}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
  INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-internal-shared-secret-change-me}

services:
  postgres:
    # Custom image bakes in init-db.sql (creates the per-service databases),
    # so there is no fragile single-file bind mount.
    build:
      context: ./backend/deploy
      dockerfile: postgres.Dockerfile
    image: beas-postgres:16
    environment:
      POSTGRES_USER: galuh
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-galuh}
      POSTGRES_DB: galuh
    ports:
      # Exposed so locally-run (native) services can reach Postgres during
      # `npm run dev`. The full docker stack uses the internal network instead.
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U galuh"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]

  auth:
    build:
      context: ./backend
      args: { SERVICE: auth }
    environment:
      <<: *service-env
      PORT: "8081"
      AUTH_DATABASE_URL: postgres://galuh:${POSTGRES_PASSWORD:-galuh}@postgres:5432/galuh_auth?sslmode=disable
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin12345}
    depends_on:
      postgres: { condition: service_healthy }
    networks: [internal]

  wiki:
    build:
      context: ./backend
      args: { SERVICE: wiki }
    environment:
      <<: *service-env
      PORT: "8082"
      WIKI_DATABASE_URL: postgres://galuh:${POSTGRES_PASSWORD:-galuh}@postgres:5432/galuh_wiki?sslmode=disable
    depends_on:
      postgres: { condition: service_healthy }
    networks: [internal]

  quiz:
    build:
      context: ./backend
      args: { SERVICE: quiz }
    environment:
      <<: *service-env
      PORT: "8083"
      QUIZ_DATABASE_URL: postgres://galuh:${POSTGRES_PASSWORD:-galuh}@postgres:5432/galuh_quiz?sslmode=disable
    depends_on:
      postgres: { condition: service_healthy }
    networks: [internal]

  transliterate:
    build:
      context: ./backend
      args: { SERVICE: transliterate }
    environment:
      <<: *service-env
      PORT: "8084"
    networks: [internal]

  gateway:
    build:
      context: ./backend
      args: { SERVICE: gateway }
    environment:
      <<: *service-env
      PORT: "8080"
      AUTH_URL: http://auth:8081
      WIKI_URL: http://wiki:8082
      QUIZ_URL: http://quiz:8083
      TRANSLIT_URL: http://transliterate:8084
    ports:
      - "8080:8080"
    depends_on: [auth, wiki, quiz, transliterate]
    networks: [internal]

  frontend:
    build:
      context: ./frontend
    environment:
      # Server-side calls go directly to the gateway over the docker network;
      # the browser uses the public URL.
      API_INTERNAL_URL: http://gateway:8080
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-internal-shared-secret-change-me}
      # Set true only when serving over HTTPS (Secure cookies are dropped on HTTP).
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      # Google OAuth (optional). Leave the client id/secret empty to hide the
      # "Masuk dengan Google" button. Set up credentials at
      # https://console.cloud.google.com and use the callback URL below.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3000/api/auth/google/callback}
    ports:
      - "3000:3000"
    depends_on: [gateway]
    networks: [internal]

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
